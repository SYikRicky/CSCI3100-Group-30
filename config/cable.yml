# Redis adapter allows broadcasts across multiple processes and browser sessions.
# Requires Redis running (configured in docker-compose.yml).
development:
  adapter: async

# Use async so browser clients (e.g. Cucumber + Selenium + Turbo Streams) receive
# broadcasts in the same Puma process. The :test adapter only queues for assert_broadcasts.
test:
  adapter: async

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
