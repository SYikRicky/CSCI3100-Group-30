version: 2
updates:
- package-ecosystem: bundler
  directory: "/"
  schedule:
    interval: weekly
  groups:
      ruby-gems:
        patterns:
          - "*" # Groups all gem updates together
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
  groups:
      ruby-gems:
        patterns:
          - "*" # Groups all gem updates together